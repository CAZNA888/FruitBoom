<!DOCTYPE html>
<html lang="en-us">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
        <title>Fruit Merge</title>
        <link rel="preconnect" href="https://bridge.playgama.com">
        <link rel="preload" href="Build/Fruit_VK.wasm.unityweb" as="fetch" type="application/wasm" crossorigin>
        <link rel="preload" href="Build/Fruit_VK.data.unityweb" as="fetch" crossorigin>
        <link rel="preload" href="Build/Fruit_VK.framework.js.unityweb" as="script">
        <style>
            html, body {
                width: 100%;
                height: 100%;
                padding: 0px;
                margin: 0px;
            }
            .fullscreen-canvas {
                background: #242424;
                width: 100%;
                height: 100%;
                position: absolute;
                top: 0px;
                left: 0px;
            }

            #preloader {
                position: fixed;
                inset: 0;
                z-index: 9999;
                background: #18121f;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .preloader-bar {
                width: 180px;
                height: 8px;
                border-radius: 999px;
                overflow: hidden;
                background: rgba(160, 90, 255, 0.18);
            }

            .preloader-fill {
                width: 45%;
                height: 100%;
                border-radius: 999px;
                background: linear-gradient(90deg, #7b2cff, #c06bff);
                animation: preloaderSlide 1.1s ease-in-out infinite;
            }

            @keyframes preloaderSlide {
                0% {
                    transform: translateX(-120%);
                }
                100% {
                    transform: translateX(260%);
                }
            }
        </style>
    </head>
    <body>
        <div id="preloader">
            <div class="preloader-bar">
                <div class="preloader-fill"></div>
            </div>
        </div>
        <canvas id="canvas" class="fullscreen-canvas"></canvas>
        <script src="./playgama-bridge-unity.js"></script>
    </body>
</html>
